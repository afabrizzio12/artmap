name: Ingest Met Museum

on:
  schedule:
    # Weekly on Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max objects to fetch (leave empty for full run)"
        required: false
        default: ""
      department:
        description: "Department ID to filter (leave empty for all)"
        required: false
        default: ""

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ingestion
        run: |
          ARGS="--resume"
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"
          fi
          if [ -n "${{ github.event.inputs.department }}" ]; then
            ARGS="$ARGS --department ${{ github.event.inputs.department }}"
          fi
          python scripts/ingest_met.py $ARGS

      - name: Commit updated data
        run: |
          git config user.name "artmap-bot"
          git config user.email "artmap-bot@users.noreply.github.com"
          git add output/met/
          git diff --cached --quiet || git commit -m "chore: update Met data $(date -u +'%Y-%m-%d')"
          git push
